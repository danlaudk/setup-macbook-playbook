- name: install erlang, scala, go, nim, and python3
  homebrew:
    name: [
      "golang",
      "scala",
      "sbt",
      "erlang",
      "nim",
      "bun",
      "haskell-stack",
    ]
    state: present
  tags:
    - languages


- name: install Java packages
  homebrew:
    name: [
      "maven",
      "jenv",
      "openjdk@11",
      "openjdk@17",
      "openjdk@21",
    ]
    state: present
  tags:
    - languages
